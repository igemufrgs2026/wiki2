<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            text-shadow: 2px 2px 0 #000;
        }

        header {
            margin-top: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #ffcc00;
            font-size: 2rem;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 2rem 2rem;
        }

        /* --- STAGE AREA (Top) --- */
        .fight-stage {
            display: flex;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .player-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }

        .fighter-display {
            width: 100%;
            height: 400px;
            border: 4px solid #fff;
            background: rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .fighter-display img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Hide Player 1 image initially to avoid broken image icons */
        #p1-img {
            display: none;
        }

        .player-label {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #ff0044;
        }

        .player-two .player-label {
            color: #0088ff;
        }

        .description-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
            padding: 1.5rem;
            width: 100%;
            min-height: 140px;
            font-family: sans-serif;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: center;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .role-badge {
            color: #ffcc00;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            font-family: 'Press Start 2P', cursive;
        }

        .vs-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 150px;
        }

        .vs-container img {
            width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
        }

        /* --- ROSTER AREA (Bottom) --- */
        .roster-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 1.5rem;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .roster-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 900px;
            margin-bottom: 1.5rem;
        }

        .roster-slot {
            width: 70px;
            height: 70px;
            border: 2px solid #555;
            cursor: pointer;
            transition: all 0.1s;
            background: #222;
        }

        .roster-slot:hover {
            border-color: #ffcc00;
            transform: scale(1.1);
            z-index: 10;
        }

        .roster-slot.active {
            border-color: #ff0044;
            box-shadow: 0 0 12px #ff0044;
            transform: scale(1.1);
        }

        .roster-slot canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Team Info Button */
        .info-btn {
            background: #ffcc00;
            color: #000;
            border: 2px solid #fff;
            padding: 12px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 2px 2px 0 #fff;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .info-btn:hover {
            background: #fff;
            box-shadow: 4px 4px 0 #ffcc00;
        }

        .info-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 #fff;
        }
    </style>
</head>
<body>

    <header>SELECT YOUR FIGHTER</header>

    <div class="main-container">
        
        <!-- STAGE AREA -->
        <div class="fight-stage">
            <!-- Player 1 -->
            <div class="player-col player-one">
                <div class="player-label">PLAYER 1</div>
                <div class="fighter-display">
                    <img id="p1-img" src="" alt="Player 1">
                </div>
                <div class="description-box" id="p1-desc-box">
                    <span id="p1-desc">Select a fighter...</span>
                </div>
            </div>

            <!-- VS LOGO -->
            <div class="vs-container">
                <img src="vs.gif" alt="VS">
            </div>

            <!-- Player 2 (Enemy) -->
            <div class="player-col player-two">
                <div class="player-label">ENEMY</div>
                <div class="fighter-display">
                    <img id="p2-img" src="0.gif" alt="Enemy">
                </div>
                <div class="description-box">
                    <span id="p2-desc">The final boss awaits. No one survives their devastating attack.</span>
                </div>
            </div>
        </div>

        <!-- ROSTER AREA (Bottom Bar) -->
        <div class="roster-bar">
            <!-- Grid for 21 fighters -->
            <div class="roster-grid" id="roster">
                <!-- Generated via JavaScript -->
            </div>
            
            <!-- Redirect Button -->
            <button class="info-btn" id="btn-info" onclick="window.location.href='/pages/team/membersinfo'">MORE ABOUT OUR FIGHTERS</button>
        </div>

    </div>

    <script>
        // Data for 21 team members
        const rosterData = [
            { name: "Diego", role: "Main PI", desc: "The grandmaster. Oversees the entire operation with unmatched wisdom." },
            { name: "Rica", role: "PI", desc: "A master strategist. Guides the squad with expert precision." },
            { name: "Mauricio", role: "PI", desc: "A veteran researcher. His insight can turn the tide of any battle." },
            { name: "Isabelli", role: "Student Leader", desc: "Vanguard of the squad. Leads the charge with raw determination." },
            { name: "Camilla", role: "Student Leader", desc: "Fearless and tactical. Always ready for the next big challenge." },
            { name: "Bruna", role: "Student Leader", desc: "A natural commander. Keeps the team focused under heavy pressure." },
            { name: "Lorenzo", role: "Student Leader", desc: "A brilliant tactician. Brings logic and precision to the frontline." },
            { name: "Felipe", role: "Student Member", desc: "A rising star. Brings relentless energy to the battlefield." },
            { name: "Fred", role: "Student Member", desc: "Quick on his feet. Always prepared to back up the squad." },
            { name: "Rodrigo", role: "Student Member", desc: "Steadfast and reliable. The backbone of the team's defense." },
            { name: "Mari Loira", role: "Student Member", desc: "Agile and creative. Strikes with unexpected solutions." },
            { name: "Duda", role: "Student Member", desc: "Fiercely dedicated. Never backs down from a tough experiment." },
            { name: "Mari linck", role: "Student Member", desc: "A precision striker. Handles complex tasks with ease." },
            { name: "Esther", role: "Student Member", desc: "Resourceful and sharp. Always finds a way to win." },
            { name: "Iara", role: "Student Member", desc: "Unpredictable and dynamic. A true wild card in the arena." },
            { name: "Ana Alicia", role: "Student Member", desc: "Highly adaptable. Excels in any situation thrown her way." },
            { name: "Sofia", role: "Student Member", desc: "A brilliant mind. Analyzes every angle before making a move." },
            { name: "João Vítor", role: "Student Member", desc: "Determined and brave. Pushes limits to achieve victory." },
            { name: "Isabella Ruiva", role: "Advisor", desc: "A seasoned veteran. Provides crucial intel from the shadows." },
            { name: "Soroka", role: "Advisor", desc: "Wise and experienced. Guides the newcomers to their full potential." },
            { name: "Iara", role: "Advisor", desc: "A guiding force. Offers invaluable knowledge when the team needs it most." }
        ];

        let currentPlayerIndex = null;
        const rosterContainer = document.getElementById('roster');
        const p1Img = document.getElementById('p1-img');
        const p1DescBox = document.getElementById('p1-desc-box');

        // Initialize selection grid
        rosterData.forEach((char, index) => {
            const charId = index + 1; // 1 to 21
            const imageSrc = `${charId}.gif`;

            const slot = document.createElement('div');
            slot.className = 'roster-slot';
            slot.dataset.index = index;
            
            const canvas = document.createElement('canvas');
            canvas.width = 70;
            canvas.height = 70;
            slot.appendChild(canvas);
            
            // Load GIF in background to draw the 1st frame on canvas
            const img = new Image();
            img.src = imageSrc;
            img.onload = () => {
                const ctx = canvas.getContext('2d');
                
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const scaledW = img.width * scale;
                const scaledH = img.height * scale;
                
                const offsetX = (canvas.width - scaledW) / 2;
                const offsetY = (canvas.height - scaledH) * 0.15; 
                
                ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);
            };

            // Selection event
            slot.addEventListener('click', () => {
                currentPlayerIndex = index;
                
                // Show the image element and update its source
                p1Img.style.display = 'block';
                p1Img.src = imageSrc;
                
                // Inject styled HTML into the description box
                p1DescBox.innerHTML = `
                    <div class="role-badge">[ ${char.role} ]</div>
                    <strong>${char.name}</strong>
                    <br><br>
                    <span>${char.desc}</span>
                `;

                // Update active selection styling
                document.querySelectorAll('.roster-slot').forEach(el => el.classList.remove('active'));
                slot.classList.add('active');
            });

            rosterContainer.appendChild(slot);
        });

    </script>
</body>
</html>
